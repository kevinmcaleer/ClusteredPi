# Chatter — comment/auth service for kevsrobots.com
# Deploy on any node:
#   1. Copy .env.example to .env and fill in values
#   2. docker compose -f docker-compose.prod.yml up -d

services:
  chatter:
    image: 192.168.2.1:5000/kevsrobots/chatter:latest
    pull_policy: never
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-changeme}
      - PORT=8006
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8006/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    # ``--edge-ip-version 4`` forces the QUIC socket to IPv4 only.
    # Without it, cloudflared binds a dual-stack [::] socket; if the
    # host has IPv6 partly enabled but no working IPv6 default route
    # (common after a Pi power-cut / DHCP-renew glitch) every send
    # fails with "sendmsg: network is unreachable" and the tunnel
    # never connects. IPv4-only is the surgical fix and stays
    # working regardless of how the host's IPv6 looks.
    command: tunnel --no-autoupdate --edge-ip-version 4 run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      chatter:
        condition: service_healthy
    network_mode: "service:chatter"
