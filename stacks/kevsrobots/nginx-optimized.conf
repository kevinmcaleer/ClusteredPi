http {
    include /etc/nginx/mime.types;
    index index.html index.htm;

    # Disable gzip - let Cloudflare handle compression
    gzip off;

    # Timeout settings - prevent premature connection closure
    keepalive_timeout 75s;
    keepalive_requests 100;
    send_timeout 60s;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # Buffer settings for large files
    client_body_buffer_size 128k;
    client_max_body_size 10m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    output_buffers 1 32k;
    postpone_output 1460;

    # Sendfile optimization for large files
    sendfile on;
    sendfile_max_chunk 512k;
    tcp_nopush on;
    tcp_nodelay on;

    server {
        root /www/data/;
        listen 3333;
        listen [::]:3333;

        # Disable nginx version in headers
        server_tokens off;

        # Emit RELATIVE redirects (e.g. `Location: /parts/`) so the
        # auto-trailing-slash redirect for directory access doesn't leak
        # the internal scheme/host/port. Without this, a request for
        # ``/parts`` produces ``Location: http://www.kevsrobots.com:3333/parts/``
        # — nginx's defaults are ``absolute_redirect on; port_in_redirect on;``
        # and we listen on :3333 behind the Cloudflare tunnel, so the URL
        # the browser tries next is unreachable. Relative redirects let
        # the browser resolve against the original https://www.kevsrobots.com.
        absolute_redirect off;

        # Health check endpoint for Cloudflare
        location /health {
            access_log off;
            default_type text/plain;
            return 200 "OK\n";
        }

        # Browser caching for static assets
        location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location ~* \.(css|js)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location ~* \.(woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # HTML caching (shorter duration)
        location ~* \.html?$ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        location / {
            # Serve the file directly; or its .html counterpart; or the
            # directory's index.html; otherwise return a real 404 so the
            # 404.html JS-redirector (issue #152: /projects/<owner>/<slug>,
            # and the legacy /profile/<username>/ shape) can fire.
            #
            # NOTE: previously this ended in `/index.html` which served the
            # home page with status 200 for every unknown path — that
            # silently broke the 404.html redirector AND made every typo'd
            # URL look like the home page to crawlers.
            try_files $uri $uri.html $uri/ =404;
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # Use the Jekyll-generated 404 page (which embeds the
        # redirect-on-pattern JS) for any 404 from try_files above.
        error_page 404 /404.html;
    }
}

events {
    worker_connections 1024;
}
