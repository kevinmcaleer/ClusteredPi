# Search API for kevsrobots.com
# Deploy on any node:
#   1. Build and push: (from kevsrobots.com/search_app)
#      docker build -t 192.168.2.1:5000/search:latest .
#      docker push 192.168.2.1:5000/search:latest
#   2. Copy .env.example to .env and fill in values
#   3. docker compose -f docker-compose.prod.yml up -d
#
# The search.db SQLite index is baked into the image at build time.
# Rebuild the image to update the search index.

services:
  search:
    image: 192.168.2.1:5000/search:latest
    env_file: .env
    environment:
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      search:
        condition: service_healthy
    network_mode: "service:search"
