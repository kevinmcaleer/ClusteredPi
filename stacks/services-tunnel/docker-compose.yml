# Services tunnel — routes secondary services through Cloudflare.
#
# Runs on dev04 with host network so it can reach services on
# other nodes via LAN IPs. All routing is configured in the
# Cloudflare Zero Trust dashboard.
#
# Setup:
#   1. Create a tunnel called "kevsrobots-services" in Cloudflare
#   2. Copy .env.example to .env and set TUNNEL_TOKEN
#   3. Add public hostname routes in the dashboard (see below)
#   4. docker compose up -d
#
# Dashboard routes:
#   nibsy.kevsrobots.com       → http://localhost:8200
#   page_count.kevsrobots.com  → http://localhost:8005
#   stats.kevsrobots.com       → http://localhost:8008
#   chatter.kevsrobots.com     → http://192.168.2.2:8006
#   md2script.kevs.wtf         → http://192.168.2.5:8000
#   noodleplanner.com          → http://192.168.2.5:8007
#   www.noodleplanner.com      → http://192.168.2.5:8007

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    network_mode: host
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: unless-stopped
