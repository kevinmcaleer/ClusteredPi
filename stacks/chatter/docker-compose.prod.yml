# Chatter — comment/auth service for kevsrobots.com
# Deploy on any node:
#   1. Copy .env.example to .env and set TUNNEL_TOKEN
#   2. docker compose -f docker-compose.prod.yml up -d

services:
  chatter:
    image: 192.168.2.1:5000/kevsrobots/chatter:latest
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-changeme}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8006/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      chatter:
        condition: service_healthy
    network_mode: "service:chatter"
